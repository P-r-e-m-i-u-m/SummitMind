<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SummitMind</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">local-first open source</p>
        <h1>SummitMind</h1>
      </div>
      <div class="topbar-actions">
        <button id="exportButton" type="button">Export</button>
        <label class="import-button">
          Import
          <input id="importInput" type="file" accept="application/json">
        </label>
      </div>
    </header>

    <main class="shell">
      <section class="composer" aria-labelledby="composerTitle">
        <div class="section-heading">
          <h2 id="composerTitle">Capture a memory</h2>
          <p>Write the context your future self would otherwise lose.</p>
        </div>

        <form id="memoryForm">
          <div class="field-grid">
            <label>
              Title
              <input id="titleInput" name="title" type="text" placeholder="Why I paused the portfolio redesign" required>
            </label>
            <label>
              Type
              <select id="typeInput" name="type">
                <option value="Reflection">Reflection</option>
                <option value="Decision">Decision</option>
                <option value="Project log">Project log</option>
                <option value="Conversation">Conversation</option>
                <option value="Idea">Idea</option>
              </select>
            </label>
          </div>

          <label>
            Memory
            <textarea id="bodyInput" name="body" rows="7" placeholder="What happened? What did you feel? What did you decide? What still feels unfinished?" required></textarea>
          </label>

          <label>
            Tags
            <input id="tagsInput" name="tags" type="text" placeholder="project, doubt, learning, family">
          </label>

          <button class="primary" type="submit">Save memory</button>
        </form>
      </section>

      <section class="insights" aria-labelledby="insightsTitle">
        <div class="section-heading">
          <h2 id="insightsTitle">Patterns</h2>
          <p>Signals from your archive. Nothing leaves this browser.</p>
        </div>
        <div id="insightGrid" class="insight-grid"></div>
      </section>

      <section class="archive" aria-labelledby="archiveTitle">
        <div class="archive-header">
          <div class="section-heading">
            <h2 id="archiveTitle">Archive</h2>
            <p id="archiveCount">No memories yet.</p>
          </div>
          <input id="searchInput" class="search" type="search" placeholder="Search memories, tags, decisions">
        </div>

        <div id="timeline" class="timeline"></div>
      </section>
    </main>

    <template id="memoryTemplate">
      <article class="memory-card">
        <div class="memory-card-header">
          <div>
            <p class="memory-meta"></p>
            <h3></h3>
          </div>
          <button class="ghost delete-button" type="button" aria-label="Delete memory">Delete</button>
        </div>
        <p class="memory-body"></p>
        <div class="tag-row"></div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
