<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SummitMind</title>
    <meta
      name="description"
      content="A local-first memory app for understanding thoughts, decisions, projects, and recurring patterns."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#archiveTitle">Skip to archive</a>
    <header class="topbar">
      <div>
        <p class="eyebrow">local-first open source</p>
        <h1>SummitMind</h1>
        <p id="statusMessage" class="status-message" aria-live="polite"></p>
      </div>
      <div class="topbar-actions">
        <button id="sampleButton" type="button">Load demo</button>
        <button id="exportButton" type="button">Export</button>
        <label class="import-button">
          Import
          <input id="importInput" type="file" accept="application/json" />
        </label>
      </div>
    </header>

    <main class="shell">
      <section class="composer" aria-labelledby="composerTitle">
        <div class="section-heading">
          <h2 id="composerTitle">Capture a memory</h2>
          <p>Write the context your future self would otherwise lose.</p>
        </div>

        <form id="memoryForm">
          <div class="field-grid">
            <label>
              Title
              <input
                id="titleInput"
                name="title"
                type="text"
                placeholder="Why I paused the portfolio redesign"
                required
              />
            </label>
            <label>
              Type
              <select id="typeInput" name="type">
                <option value="Reflection">Reflection</option>
                <option value="Decision">Decision</option>
                <option value="Project log">Project log</option>
                <option value="Conversation">Conversation</option>
                <option value="Idea">Idea</option>
              </select>
            </label>
          </div>

          <label>
            Memory
            <textarea
              id="bodyInput"
              name="body"
              rows="7"
              placeholder="What happened? What did you feel? What did you decide? What still feels unfinished?"
              required
            ></textarea>
          </label>

          <label>
            Tags
            <input
              id="tagsInput"
              name="tags"
              type="text"
              placeholder="project, doubt, learning, family"
            />
          </label>

          <div class="form-actions">
            <button id="saveButton" class="primary" type="submit">
              Save memory
            </button>
            <button id="cancelEditButton" class="ghost hidden" type="button">
              Cancel edit
            </button>
          </div>
        </form>
      </section>

      <section class="insights" aria-labelledby="insightsTitle">
        <div class="split-heading">
          <div class="section-heading">
            <h2 id="insightsTitle">Patterns</h2>
            <p>Signals from your archive. Nothing leaves this browser.</p>
          </div>
          <div class="report-actions">
            <button id="reportButton" type="button">Report</button>
            <button id="copyReportButton" type="button" disabled>Copy</button>
            <button id="printButton" type="button">Print</button>
          </div>
        </div>
        <div id="insightGrid" class="insight-grid"></div>
        <article
          id="reflectionReport"
          class="reflection-report"
          hidden
        ></article>
      </section>

      <section class="archive" aria-labelledby="archiveTitle">
        <div class="archive-header">
          <div class="section-heading">
            <h2 id="archiveTitle">Archive</h2>
            <p id="archiveCount">No memories yet.</p>
          </div>
          <input
            id="searchInput"
            class="search"
            type="search"
            placeholder="Search memories, tags, decisions"
          />
        </div>

        <div
          id="tagFilters"
          class="tag-filters"
          aria-label="Filter memories by tag"
        ></div>
        <div id="timeline" class="timeline"></div>
      </section>
    </main>

    <template id="memoryTemplate">
      <article class="memory-card">
        <div class="memory-card-header">
          <div>
            <p class="memory-meta"></p>
            <h3></h3>
          </div>
          <div class="memory-actions">
            <button class="ghost pin-button" type="button">Pin</button>
            <button class="ghost edit-button" type="button">Edit</button>
            <button
              class="ghost delete-button"
              type="button"
              aria-label="Delete memory"
            >
              Delete
            </button>
          </div>
        </div>
        <p class="memory-body"></p>
        <div class="tag-row"></div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
